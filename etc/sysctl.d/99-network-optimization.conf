# --- Queue and Congestion Control ---
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# --- Speed & Connectivity ---
# Increase the maximum number of "boxes" (packets) waiting to be processed
net.core.netdev_max_backlog = 16384
# Allow more simultaneous connections
net.core.somaxconn = 8192
# Enable TCP Fast Open (Snappier web browsing)
net.ipv4.tcp_fastopen = 3
# Modern TCP window scaling (Crucial for high speed)
net.ipv4.tcp_window_scaling = 1

# --- Memory Buffers (Fine-tuned for speed) ---
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# --- Security & Stealth ---
# Ignore "pings" from strangers to stay hidden/secure
net.ipv4.icmp_echo_ignore_all = 1

# Prefer IPv4 over IPv6 for faster initial lookups
net.ipv4.ip_local_port_range = 1024 65535
# Reduce time the connection stays in FIN-WAIT-2 (cleans up old connections faster)
net.ipv4.tcp_fin_timeout = 15

# Help prevent "bufferbloat" (lag when downloading)
net.ipv4.tcp_slow_start_after_idle = 0

# Fast recycling of the "wait" state
net.ipv4.tcp_tw_reuse = 1

# Maximize the number of open files (Good for many browser tabs)
fs.file-max = 2097152
