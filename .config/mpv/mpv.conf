## --- 1. UI & Window Management ---
# Total minimalism for Hyprland
osc=no                          # No default controller
border=no                       # No window decorations
osd-bar=no                      # No progress bar on seek
keep-open=yes                   # Stay open after video ends
ontop=yes                        # Don't force stay on top
autofit=80%                     # Default window size on start
geometry=50%:50%                # Center window on start
cursor-autohide=500             # Hide cursor after 0.5s
msg-color=yes                   # Colored console logs
save-position-on-quit=yes       # Resume where you left off
fs=yes                          # Start in fullscreen

## --- 2. Video Rendering & Hardware (STABLE) ---
vo=gpu                          # Changed from gpu-next for better compatibility
gpu-api=opengl                  # Changed from vulkan (Iris Xe loves OpenGL)
gpu-context=wayland             # Keep this for Hyprland
hwdec=vaapi                     # Intel-specific hardware acceleration
video-sync=display-resample
interpolation=yes                # Often smoother than OpenGL on Intel

## --- 3. High Quality Scaling & Shaders ---
# Change these if you experience lag, but Iris Xe handles these easily
scale=spline36                  # Sharp, clean upscaling
dscale=mitchell                 # Smooth downscaling
cscale=spline36                 # High quality chroma scaling
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
dither-depth=auto

## --- 4. Audio Settings ---
ao=pipewire                     # Direct output to Pipewire
volume=100                       # Default startup volume
volume-max=150                  # Allow boosting up to 150%
audio-file-auto=fuzzy           # Load external audio files automatically
audio-pitch-correction=yes      # Don't change pitch when changing speed

## --- 5. Subtitle Aesthetics ---
# Professional, minimal typography
sub-auto=fuzzy                  # Load subs containing video name
sub-font='Inter'                # Clean sans-serif
sub-font-size=30
sub-color='#FFFFFF'
sub-border-size=1.0
sub-shadow-offset=0
sub-spacing=0.5
sub-margin-y=30                 # Distance from bottom
sub-bold=yes

## --- 6. Cache & Network (Streaming) ---
# Better performance for YT-DLP/Streams
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=150MiB
tls-verify=yes

## --- 7. Screenshots ---
# Save high-quality frames
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-template="~/Pictures/Screenshots/mpv-%F-%p"

## --- 8. Specific Profiles ---
# Add scripts or specific hardware overrides here
[thumbfast]
spawn-first=yes
network=yes
hwdec=auto

[protocol.https]
cache=yes
user-agent='Mozilla/5.0'

## --- MPRIS / Logging Fix ---
# This ensures MPV talks to your mpris widget
# Requires 'mpv-mpris' package installed
input-ipc-server=/tmp/mpvsocket # Socket for external control
term-osd-bar=yes                # Force progress bar in terminal logs
msg-level=all=status            # Set log level to show playback status

# --- UI Scaling ---
# Increase this number to make everything bigger (default is 1)
ui_scale=0.5

# --- Progress Bar Height ---
# Height of the timeline when it is "minimized" (just a thin line)
timeline_height=5
# Height of the timeline when you hover over it
timeline_hover_height=15

# --- Volume Bar ---
# Size of the volume bar on the side
volume_size=10
# Where the volume bar appears (left or right)
volume_border=right

# --- Padding & Margins ---
# If you want the UI to "float" away from the screen edges
window_border_size=5
title="${filename}"
