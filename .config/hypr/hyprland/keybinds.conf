# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

#!
##! General
# Core shell interactions
bindn = Super, Super_L, exec, pkill anyrun || anyrun # Anyrun Launcher
bind = SUPER, A, exec, ~/.config/quickshell/launch.sh overview # System Overview
bind = SUPER+Ctrl, K, exec, ~/.config/quickshell/launch.sh cheatsheet # Show Cheatsheet
bind = SUPER+Ctrl, T, exec, ~/.config/quickshell/launch.sh wallpaperSelector # Wallpaper Selector

##! Apps
# Quick launch applications
bind = Super, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" # Terminal
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "thunar" "nautilus" "dolphin" # File Manager
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "zen-browser" "firefox" "google-chrome-stable" # Browser
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "zed" "kate" # Code Editor
bind = Super, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kate" "gnome-text-editor" # Text Editor
bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" # Settings
bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "missioncenter" "btop" # Task Manager

##! Window Management
# Focus and positioning
bindm = Super, mouse:272, movewindow # Move with Mouse
bindm = Super, mouse:273, resizewindow # Resize with Mouse
bind = Super, Q, killactive, # Close Window
bind = Super, Left, movefocus, l # Focus Left
bind = Super, Right, movefocus, r # Focus Right
bind = Super, Up, movefocus, u # Focus Up
bind = Super, Down, movefocus, d # Focus Down
bind = Super+Shift, Left, movewindow, l # Move Window Left
bind = Super+Shift, Right, movewindow, r # Move Window Right
bind = Super+Shift, Up, movewindow, u # Move Window Up
bind = Super+Shift, Down, movewindow, d # Move Window Down
bind = Super+Alt, Space, togglefloating, # Toggle Floating
bind = Super, F, fullscreen, 0 # Toggle Fullscreen
bind = Super, D, fullscreen, 1 # Maximize Window
bind = Super, P, pin # Pin Window

##! Workspace
# Navigation and relocation
bind = Super, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 # Workspace 1
bind = Super, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 # Workspace 2
bind = Super, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3 # Workspace 3
bind = Super, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4 # Workspace 4
bind = Super, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5 # Workspace 5
bind = Super, S, togglespecialworkspace, # Toggle Scratchpad
bind = Super+Alt, S, movetoworkspacesilent, special # Send to Scratchpad
bind = Super+Alt, 1, movetoworkspacesilent, 1 # Move to WS 1
bind = Super+Alt, 2, movetoworkspacesilent, 2 # Move to WS 2
bind = Super+Alt, 3, movetoworkspacesilent, 3 # Move to WS 3

##! Utilities
# Screenshot and Productivity
bindd = Super, V, Clipboard, exec, anyrun --plugins libclipboard.so # Clipboard History
bindd = Super, Period, Emoji, exec, ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # Emoji Selector
bind = Alt, Print, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh window # Screenshot Window
bind = , Print, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh output # Screenshot Screen
bindl = SUPER+SHIFT, S, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh region # Screenshot Region
bindd = Super+Alt, R, Record, exec, ~/.config/hypr/hyprland/scripts/record.sh # Record Region

##! Media & Screen
# Volume, Brightness, Playback
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume up # Increase Volume
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume down # Decrease Volume
bindl = , XF86AudioMute, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume mute # Mute Audio
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/hyprland/scripts/osd.sh brightness up # Increase Brightness
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/hyprland/scripts/osd.sh brightness down # Decrease Brightness
bindl = Super+Shift, P, exec, playerctl play-pause # Play/Pause Media
bindl = Super+Shift, N, exec, playerctl next # Next Track
bindl = Super+Shift, B, exec, playerctl previous # Previous Track

##! System
# Session and Power
bind = Super, L, exec, $HOME/.config/hyprlock/scripts/hyprlock.sh # Lock Screen
bindld = Super+Shift, L, Suspend, exec, systemctl suspend # Suspend System
bind = , XF86PowerOff, exec, ~/.local/bin/wlogout-toggle # Session Menu
bind = SUPER CTRL, R, exec, killall qs && qs -d # Restart Shell
