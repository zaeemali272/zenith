# Lines ending with `# [hidden]` won't be shown on cheatsheet
# Lines starting with #! are section headings

#!
##! General
# Core shell interactions
bindn = Super, Super_L, exec, pkill anyrun || anyrun # Anyrun Launcher
bind = SUPER, A, exec, ~/.config/quickshell/launch.sh overview # System Overview
bind = SUPER + Ctrl, K, exec, ~/.config/quickshell/launch.sh cheatsheet # Show Cheatsheet
bind = SUPER + Ctrl, T, exec, ~/.config/quickshell/launch.sh wallpaperSelector # Wallpaper Selector

##! Apps
# Quick launch applications
bind = Super, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" # Terminal
bind = Super, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" # [hidden] Terminal
bind = Alt, Return, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kitty -1" "foot" "alacritty" # Terminal
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "thunar" "nautilus" "dolphin" # File Manager
bind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "zen-browser" "firefox" "google-chrome-stable" # Browser
bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "zeditor" "kate" # Code Editor
bind = Super, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "zeditor" "gnome-text-editor" # Text Editor
bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" # Settings
bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "missioncenter" "btop" # Task Manager

##! System
# Session and Power
bind = Super, L, exec, $HOME/.config/hyprlock/scripts/hyprlock.sh # Lock Screen
bindld = Super + Shift, L, Suspend, exec, systemctl suspend # Suspend System
bind = , XF86PowerOff, exec, pkill wlogout || wlogout -m 300px -p layer-shell # Session Menu
bind = Ctrl + Alt, Delete, exec, quickshell -c $qsConfig ipc call TEST_ALIVE || pkill wlogout || wlogout -m 300px -p layer-shell # Session menu (fallback)
bindl = Super, XF86PowerOff, exec, systemctl poweroff # Power OffT
bind = SUPER CTRL, R, exec, pkill quickshell && quickshell -d || quickshell -d # Restart Shell

##! Window Management
# Focus and positioning
bindm = Super, mouse:272, movewindow # Move with Mouse
bindm = Super, mouse:273, resizewindow # Resize with Mouse
bind = Super, Q, killactive, # Close Window
bind = Super + Shift + Alt, Q, exec, hyprctl kill # Forcefully zap a window
bind = Super, ArrowKey, movefocus, direction # Focus Window in direction
bind = Super, Left, movefocus, l # [hidden] Focus Left
bind = Super, Right, movefocus, r # [hidden] Focus Right
bind = Super, Up, movefocus, u # [hidden] Focus Up
bind = Super, Down, movefocus, d # [hidden] Focus Down
bind = Super + Shift, ArrowKey, movewindow, direction # Move Window in direction
bind = Super + Shift, Left, movewindow, l # [hidden] Move Window Left
bind = Super + Shift, Right, movewindow, r # [hidden] Move Window Right
bind = Super + Shift, Up, movewindow, u # [hidden] Move Window Up
bind = Super + Shift, Down, movewindow, d # [hidden] Move Window Down
bind = Super + Alt, Space, togglefloating, # Toggle Floating
bind = Super, F, fullscreen, 0 # Toggle Fullscreen
bind = Super, D, fullscreen, 1 # Maximize Window
bind = Super, P, pin # Pin Window
binde = Super, Semicolon, splitratio, -0.1 # [hidden]
binde = Super, Apostrophe, splitratio, +0.1 # [hidden]
bind = Super + Alt, F, fullscreenstate, 0 3 # Fullscreen spoof
bind = Ctrl + Super, Backslash, resizeactive, exact 640 480 # Resize to popup resolution 

# Resize windows
binde = Super + Alt, ArrowKey, resizeactive, 10 direction # Resize window in direction
binde = Super + Alt, left, resizeactive,-50 0 # [hidden] Resize window (Left)
binde = Super + Alt, right, resizeactive,50 0 # [hidden] Resize window (Right)
binde = Super + Alt, up, resizeactive,0 -50 # [hidden] Resize window (Up)
binde = Super + Alt, down, resizeactive,0 50 # [hidden] Resize window (Down)

##! Utilities
# Screenshot and Productivity
bindd = Super, V, Clipboard, exec, anyrun --plugins libclipboard.so # Clipboard History
bindd = Super, Period, Emoji, exec, ~/.config/hypr/hyprland/scripts/fuzzel-emoji.sh copy # Emoji Selector
bind = Alt, Print, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh window # Screenshot Window
bind = , Print, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh output # Screenshot Screen
bindl = SUPER + SHIFT, S, exec, ~/.config/hypr/hyprland/scripts/screenshot.sh region # Screenshot Region
bindd = Super + Alt, R, Record region (no sound), exec, ~/.config/hypr/hyprland/scripts/record.sh # Record region (no sound)
bindd = Ctrl + Alt, R, Record screen (no sound), exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen # [hidden] Record screen (no sound)
bindd = Super + Shift + Alt, R, Record screen (with sound), exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen-sound # Record screen (with sound)
bindd = Super + Shift, T, Character recognition,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png" # Character Capture
bindd = Super + Shift, C, Color picker, exec, hyprpicker -a # Color Picker


##! Media & Screen
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume up # [hidden] Increase Volume
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume down # [hidden] Decrease Volume
bindl = , XF86AudioMute, exec, ~/.config/hypr/hyprland/scripts/osd.sh volume mute # [hidden] Mute Audio
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/hyprland/scripts/osd.sh brightness up # [hidden] Increase Brightness
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/hyprland/scripts/osd.sh brightness down # [hidden] Decrease Brightness
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]
binde = Super, Minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.1 # [hidden] Zoom out
binde = Super, Equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.1 # [hidden] Zoom in
bindl = Super + Shift, P, exec, playerctl play-pause # Play/Pause Media
bindl = Super + Shift, N, exec, playerctl next # Next Track
bindl = Super + Shift, B, exec, playerctl previous # Previous Track

##! Testing
bind = Super + Alt, f11, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification with body image" "This notification should contain your user account <b>image</b> and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>. Oh and here is a random image in your Pictures folder: <img src=\"$RANDOM_IMAGE\" alt=\"Testing image\"/>" -a "Hyprland keybind" -p -h "string:image-path:/var/lib/AccountsService/icons/$USER" -t 6000 -i "discord" -A "openImage=Open profile image" -A "action2=Open the random image" -A "action3=Useless button"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"; [[ $ACTION == *action2 ]] && xdg-open \"$RANDOM_IMAGE\"' # [hidden]
bind = Super + Alt, f12, exec, bash -c 'RANDOM_IMAGE=$(find ~/Pictures -type f | grep -v -i "nipple" | grep -v -i "pussy" | shuf -n 1); ACTION=$(notify-send "Test notification" "This notification should contain a random image in your <b>Pictures</b> folder and <a href=\"https://discord.com/app\">Discord</a> <b>icon</b>.\n<i>Flick right to dismiss!</i>" -a "Discord (fake)" -p -h "string:image-path:$RANDOM_IMAGE" -t 6000 -i "discord" -A "openImage=Open profile image" -A "action2=Useless button" -A "action3=Cry more"); [[ $ACTION == *openImage ]] && xdg-open "/var/lib/AccountsService/icons/$USER"' # [hidden]
bind = Super + Alt, Equal, exec, notify-send "Urgent notification" "Ah hell no" -u critical -a 'Hyprland keybind' # [hidden]

##! Workspace
# Navigation and relocation
#/# bind = Super+Alt, Hash,, # Send to workspace # (1, 2, 3,...)
bind = Super + Alt, $num, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspace $num # Move to workspace (1, 2, 3,...)
bind = Super + Alt, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1 # [hidden]
bind = Super + Alt, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2 # [hidden]
bind = Super + Alt, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3 # [hidden]
bind = Super + Alt, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4 # [hidden]
bind = Super + Alt, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5 # [hidden]
bind = Super + Alt, 6, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6 # [hidden]
bind = Super + Alt, 7, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7 # [hidden]
bind = Super + Alt, 8, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8 # [hidden]
bind = Super + Alt, 9, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9 # [hidden]
bind = Super + Alt, 0, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]

# #/# bind = Super+Shift, Scroll ↑/↓,, # Send to workspace left/right
bind = Super + Shift, mouse_down, movetoworkspace, r-1 # [hidden]
bind = Super + Shift, mouse_up, movetoworkspace, r+1 # [hidden]

#/# bind = Super+Shift, Page_↑/↓,, # Send to workspace left/right
bind = Super + Shift, Page_Down, movetoworkspace, r+1  # [hidden]
bind = Super + Shift, Page_Up, movetoworkspace, r-1  # [hidden]
bind = Ctrl + Super + Shift, Right, movetoworkspace, r+1 # Move to workspace right
bind = Ctrl + Super + Shift, Left, movetoworkspace, r-1 # Move to workspace left

bind = Super + Alt, S, movetoworkspacesilent, special # Send to scratchpad

bind = Ctrl + Super, S, togglespecialworkspace, # Toggle scratchpad (because why not)
bind = Alt, Tab, cyclenext # [hidden] sus keybind
bind = Alt, Tab, bringactivetotop, # [hidden] bring it to the top
# Switching
#/# bind = Super, Hash,, # Focus workspace # (1, 2, 3,...)
bind = Super, $num, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace $num # Switch to workspace (1, 2, 3,...)
bind = Super, 1, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 1 # [hidden]
bind = Super, 2, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 2 # [hidden]
bind = Super, 3, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 3 # [hidden]
bind = Super, 4, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 4 # [hidden]
bind = Super, 5, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 5 # [hidden]
bind = Super, 6, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 6 # [hidden]
bind = Super, 7, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 7 # [hidden]
bind = Super, 8, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 8 # [hidden]
bind = Super, 9, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 9 # [hidden]
bind = Super, 0, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh workspace 10 # [hidden]

#/# bind = Ctrl+Super, ←/→,, # Focus left/right
bind = Ctrl + Super, Right, workspace, r+1 # [hidden]
bind = Ctrl + Super, Left, workspace, r-1 # [hidden]
#/# bind = Ctrl+Super+Alt, ←/→,, # [hidden] Focus busy left/right
bind = Ctrl + Super + Alt, Right, workspace, m+1 # [hidden]
bind = Ctrl + Super + Alt, Left, workspace, m-1 # [hidden]
#/# bind = Super, Page_↑/↓,, # Focus left/right
bind = Super, Page_Down, workspace, +1 # [hidden]
bind = Super, Page_Up, workspace, -1 # [hidden]
bind = Ctrl + Super, Page_Down, workspace, r+1 # [hidden]
bind = Ctrl + Super, Page_Up, workspace, r-1 # [hidden]
#/# bind = Super, Scroll ↑/↓,, # Focus left/right
bind = Super, mouse_up, workspace, +1 # [hidden]
bind = Super, mouse_down, workspace, -1 # [hidden]
bind = Ctrl + Super, mouse_up, workspace, r+1 # [hidden]
bind = Ctrl + Super, mouse_down, workspace, r-1 # [hidden]
## Special
bind = Super, S, togglespecialworkspace, # Toggle scratchpad
bind = Super, mouse:275, togglespecialworkspace, # [hidden]
bind = Ctrl + Super, BracketLeft, workspace, -1 # [hidden]
bind = Ctrl + Super, BracketRight, workspace, +1 # [hidden]
bind = Ctrl + Super, Up, workspace, r-5 # [hidden]
bind = Ctrl + Super, Down, workspace, r+5 # [hidden]

