# ######## Global Popup / Submenu Rules ########

# Force ALL windows that are typically dialogs/popups to float and center
windowrule = match:title ^()$, float on, center on # Catch-all for untitled popups
windowrule = match:class ^()$, float on, center on # Catch-all for classless submenus

# Catch common sub-window patterns (Submenus, Popups, Dialogs)
windowrule = match:title ^(?!.* - ).*$, float on, center on # Titles without a hyphen (usually not main apps)
windowrule = match:title .*Select.*, float on, center on
windowrule = match:title .*Confirm.*, float on, center on
windowrule = match:title .*Warning.*, float on, center on
windowrule = match:title .*Error.*, float on, center on

# ######## Window rules ########

# Disable blur for xwayland context menus
windowrule = match:class ^()$, match:title ^()$, no_blur on

# Disable blur for every window
windowrule = match:class .*, no_blur on

# My Rules
windowrule = match:title ^(Launcher)(.*)$, float on, center on, size (monitor_w*.99) (monitor_h*.95)
windowrule = match:title ^(Wallpaper Selector)(.*)$, float on, center on, size (monitor_w*.52) (monitor_h*.55)
windowrule = match:title ^(Hyprland Keybinds Cheatsheet)(.*)$, float on, center on, size (monitor_w*.40) (monitor_h*.80)
windowrule = match:title ^(mako)(.*)$, float on, move (monitor_w*.70) (monitor_h*.05)
windowrule = match:title ^(Extract)(.*)$, float on, center on
windowrule = match:title ^(Compress)(.*)$, float on, center on
windowrule = match:title ^(Rename)(.*)$, float on, center on
windowrule = match:title ^(WallpaperPicker)(.*)$, float on, center on
windowrule = match:title ^(File Operation Progress)(.*)$, center on, float on

# Combined File Dialog Rules
windowrule = match:title ^(Open File|Select a File|Open Folder|Save As|Library|File Upload)(.*)$, float on, center on

windowrule = match:title ^(.*)(wants to save|wants to open)$, float on, center on

windowrule = match:class ^(org.gnome.FileRoller)$, float on, center on, size (monitor_w*.35) (monitor_h*.16)
windowrule = match:class ^(blueberry\.py)$, float on, center on, size (monitor_w*.45) (monitor_h*.45)
windowrule = match:class ^(guifetch)$, float on, center on

# Pavucontrol
windowrule = match:class ^(pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol)$, float on, center on, size (monitor_w*.45) (monitor_h*.45)

# Networking
windowrule = match:class ^(nm-connection-editor)$, float on, center on, size (monitor_w*.45) (monitor_h*.45)

windowrule = match:class .*plasmawindowed.*, float on, center on
windowrule = match:title .*Welcome, float on, center on
windowrule = match:title .*Shell conflicts.*, float on, center on
windowrule = match:class org.freedesktop.impl.portal.desktop.kde, float on, center on, size (monitor_w*.60) (monitor_h*.65)

# Tiling
windowrule = match:class ^dev\.warp\.Warp$, tile on

# Picture-in-Picture
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on, pin on, keep_aspect_ratio on, move (monitor_w*.744) (monitor_h*.739), size (monitor_w*.25) (monitor_h*.25)

# --- Tearing ---
windowrule = match:title .*\.exe, immediate on
windowrule = match:title .*minecraft.*, immediate on
windowrule = match:class ^(steam_app).*, immediate on

# No shadow for tiled windows
windowrule = match:float 0, no_shadow on

# ######## Workspace rules ########
workspace = special:special, gapsout:30

# ######## Layer rules ########
layerrule = match:namespace .*, xray on
layerrule = match:namespace (walker|selection|overview|anyrun|indicator.*|osk|hyprpicker|noanim), no_anim on

layerrule = match:namespace (gtk-layer-shell|launcher|notifications), blur on
layerrule = match:namespace launcher, ignore_alpha 0.5
layerrule = match:namespace notifications, ignore_alpha 0.69
layerrule = match:namespace logout_dialog, blur on

# Launchers FAST
layerrule = match:namespace gtk4-layer-shell, no_anim on

# Tags
windowrule = tag +browser, match:class ^([Zz]en-browser|zen|zen-browser|[Ff]irefox|org.mozilla.firefox|[Ff]irefox-esr)$
windowrule = tag +terminal, match:class ^(Alacritty|kitty|kitty-dropterm|gnome-terminal|foot|terminal)$
windowrule = tag +email, match:class ^([Tt]hunderbird|org.gnome.Evolution|eu.betterbird.Betterbird)$
windowrule = tag +projects, match:class ^(VSCode|code-url-handler|code|visual-studio-code|vscode|zeditor)$
windowrule = tag +screenshare, match:class ^(com.obsproject.Studio)$
windowrule = tag +im, match:class ^([Dd]iscord|[Ww]ebCord|[Vv]esktop)$
windowrule = tag +games, match:class ^(gamescope|steam_app_\d+)$
windowrule = tag +gamestore, match:class ^([Ss]team)$, match:title ^([Ll]utris)$
windowrule = tag +file-manager, match:class ^([Nn]emo|[Tt]hunar|org.gnome.Nautilus|[Pp]cmanfm-qt)$
windowrule = tag +multimedia, match:class ^(youtube-music-bin|youtube-music|youtube-music-git|[Aa]udacious)$
windowrule = tag +player, match:class ^(vlc|mpv)$
windowrule = tag +settings, match:class ^(gnome-disks|wihotspot(-gui)?|file-roller|org.gnome.FileRoller|nm-applet|nm-connection-editor|blueman-manager|pavucontrol|org.pulseaudio.pavucontrol|com.saivert.pwvucontrol|nwg-look|qt5ct|qt6ct|[Yy]ad|xdg-desktop-portal-gtk|org.kde.polkit-kde-authentication-agent-1)$, match:title ^(Kvantum Manager)$
windowrule = tag +viewer, match:class ^(gnome-system-monitor|org.gnome.SystemMonitor|io.missioncenter.MissionCenter|eog|org.gnome.Loupe)$

# Opacity
windowrule = opacity 0.99 override 0.96 override, match:tag browser*
windowrule = opacity 0.95 override 0.9 override, match:tag projects*
windowrule = opacity 0.95 override 0.9 override, match:tag im*
windowrule = opacity 0.9 override 0.8 override, match:tag multimedia*
windowrule = opacity 1 override 1 override, match:tag player*
windowrule = opacity 0.95 override 0.92 override, match:tag file-manager*
windowrule = opacity 0.85 override 0.8 override, match:tag terminal*
windowrule = opacity 0.95 override 0.9 override, match:tag settings*
windowrule = opacity 0.95 override 0.9 override, match:tag viewer*
windowrule = opacity 0.95 override 0.9 override, match:tag wallpaper*
windowrule = opacity 0.95 override 0.9 override, match:class ^(gedit|org.gnome.TextEditor|mousepad)$

windowrule = match:tag (browser|terminal|projects)*, no_blur off