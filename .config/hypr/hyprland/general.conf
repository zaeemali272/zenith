# MONITOR CONFIG
monitor=,preferred,auto,1
monitor=HDMI-A-1, preferred, auto, 1, mirror, eDP-1

gestures {
    gesture = 4, horizontal, workspace
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

# Variables
$gaps_in = 2
$gaps_out = 6
$gaps_workspaces = 20
$border_size = 2
$rounding = 13
$shadow_range = 12

general {
    gaps_in = $gaps_in
    gaps_out = $gaps_out
    gaps_workspaces = $gaps_workspaces

    border_size = $border_size
    resize_on_border = true
    no_focus_fallback = false

    allow_tearing = false

    snap {
        enabled = true
        window_gap = 4
        monitor_gap = 5
        respect_gaps = true
    }
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

decoration {
    rounding = $rounding
    rounding_power = 2.0 # Uniform rounding curve optimized for performance

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        special = false
        popups = true
        input_methods = true
    }

    shadow {
        enabled = true
        range = $shadow_range
        offset = 0 2
        render_power = 1
        color = rgba(00000030)
    }

    dim_inactive = false
}

animations {
    enabled = true
    
    # Premium, rapid deceleration curve (No bounce, max initial speed)
    bezier = fluidSnap, 0.1, 1.0, 0.1, 1.0
    bezier = linear, 1, 1, 1, 1

    # --- Windows (Main Application Windows) ---
    # Swiftly slides from the direction of the screen edge/grid slot and fades in
    animation = windowsIn, 1, 2.0, fluidSnap, slide
    animation = windowsOut, 1, 1.6, fluidSnap, slide
    animation = windowsMove, 1, 1.8, fluidSnap, slide
    animation = border, 1, 1.0, linear
    
    # --- Layers (Quickshell Menus, Bars, Overlays) ---
    # Keeps your instant popup requirement for Quickshell
    animation = layersIn, 1, 1.2, fluidSnap, popin 97%
    animation = layersOut, 1, 1.0, fluidSnap, popin 99%
    
    # --- Fading ---
    animation = fadeLayersIn, 1, 1.0, fluidSnap
    animation = fadeLayersOut, 1, 1.0, fluidSnap
    
    # --- Workspaces ---
    animation = workspaces, 1, 1.8, fluidSnap, slide
    animation = specialWorkspaceIn, 1, 1.6, fluidSnap, slidevert
    animation = specialWorkspaceOut, 1, 1.4, fluidSnap, slidevert
}

input {
    kb_layout = us
    kb_options = caps:escape
    numlock_by_default = true
    repeat_delay = 200
    repeat_rate = 30
    sensitivity = 0.95
    follow_mouse = 1

    touchpad {
        natural_scroll = yes
        disable_while_typing = true # Prevents unexpected trackpad clicks while programming
        clickfinger_behavior = true
        scroll_factor = 0.7
        tap-to-click = true
        tap-and-drag = true
        drag_lock = 0
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    disable_scale_notification = true
    vrr = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = true
    swallow_regex = (?i)(foot|kitty|alacritty)
    on_focus_under_fullscreen = 2
    allow_session_lock_restore = true
    session_lock_xray = true
    initial_workspace_tracking = false
    focus_on_activate = true
}

binds {
    scroll_event_delay = 0
    hide_special_on_workspace_change = true
}

cursor {
    zoom_factor = 1
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(000000)
        workspace_method = first 1
        enable_gesture = false
    }
}

xwayland {
    force_zero_scaling = true
}