$wall = $HOME/.config/current_wallpaper.txt
$mpris_art = /tmp/hyde-mpris.png
$artfile = /tmp/hyde-mpris-blurred.png

# BACKGROUND
background {
    monitor =
    path = /home/zaeem/Pictures/Wallpapers/wallhaven-5yypm9.jpg
    blur_passes = 0
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.8916
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time Box (Shadow)
shape {
    monitor =
    size = 330, 140
    color = rgba(17, 17, 17, 0.6)  # Darker glass effect
    border_size = 1                # Subtle outline
    border_color = rgba(173, 48, 49, 0.5) # Faded red border
    shadow_passes = 1              # Lifts the box off the wallpaper
    rounding = 30
    rotate = 0
    position = 35, 380
    halign = center
    valign = center
}

# Time (Hour)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = rgb(173, 48, 49)
    font_size = 60
    font_family = TeachingPrintDotted-OVKlp
    position = -30, 400
    halign = center
    valign = center
}

# Time (Minutes)
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +":%M")</span>"
    color = rgb(235, 235, 235) # Brighter white for contrast
    font_size = 60
    font_family = TeachingPrintDotted-OVKlp
    position = 80, 400
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %B %d")"
    color = rgba(214, 209, 209, 0.8) # Softened gray
    font_size = 19
    font_family = TeachingPrintDotted-OVKlp
    position = 35, 340
    halign = center
    valign = center
}

# Profile-Photo
image {
    monitor =
    path = ~/.config/hyprlock/wallpapers/me.jpeg
    border_size = 3
    border_color = rgb(173, 48, 49)
    size = 220
    rounding = 35
    rotate = 0
    reload_time = -1
    position = 25, 90
    halign = center
    valign = center
}

# USER-BOX
shape {
    monitor =
    size = 250, 50
    color = rgba(17, 17, 17, 0.6)  # Darker glass effect
    border_size = 1                # Subtle outline
    border_color = rgba(173, 48, 49, 0.5) # Faded red border
    shadow_passes = 1              # Lifts the box off the wallpaper
    rounding = 15 # Rounded to match the profile aesthetic
    position = 34, -140
    halign = center
    valign = center
}

# USERNAME TEXT
label {
    monitor =
    text = $USER
    color = rgb(255, 255, 255) # Pure white for clarity on red background
    font_size = 15
    position = 38, -140
    halign = center
    valign = center
    zindex = 1
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    color = rgba(17, 17, 17, 0.6)  # Darker glass effect
    border_size = 1                # Subtle outline
    border_color = rgba(173, 48, 49, 0.5) # Faded red border
    shadow_passes = 1              # Lifts the box off the wallpaper
    rounding = 15 # Rounded to match the profile aesthetic
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(173, 48, 49)
    inner_color = rgba(13, 13, 13, 0.5)
    font_color = rgb(214, 209, 209)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##ffffff99">   Enter Pass</span></i>
    hide_input = false
    # --- IMPROVEMENTS ---
    check_color = rgb(204, 136, 34)
    fail_color = rgb(173, 48, 49)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    # --------------------
    position = 34, -220
    halign = center
    valign = center
}

# SMILE BOX
shape {
    monitor =
    size = 65, 65
    color = rgb(235, 235, 235) # Off-white
    rounding = 15
    position = 34, -320
    halign = center
    valign = center
}

# SMILE
label {
    monitor =
    text = :)
    color = rgb(173, 48, 49)
    font_size = 25
