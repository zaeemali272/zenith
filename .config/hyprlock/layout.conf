    position = 1570, -115
    halign = left
    valign = top
    zindex = 5
}

# MUSIC ICONS
label {
    monitor =
    text = ⟲
    color = rgb(255, 255, 255)
    font_size = 25
    position = -320, -150
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = cmd[update:1000] echo "$($music --status)"
    color = rgb(255, 255, 255)
    font_size = 21
    font_family = JetBrains Mono Nerd Font Mono
    position = -270, -148
    halign = right
    valign = top
    zindex = 5
}

label {
    monitor =
    text = »
    color = rgb(255, 255, 255)
    font_size = 25
    position = -220, -140
    halign = right
    valign = top
    zindex = 5
}

# Battery Main Box
shape {
    monitor =
    size = 340, 120
    color = rgba(173, 48, 49, 0.9)
    rounding = 25
    position = -40, -220
    halign = right
    valign = top
    zindex = 10
}

# Battery Filled Bar (Visual Progress)
label {
    monitor =
    text = cmd[update:1000] echo "$($battery --pango-bar)"
    font_size = 16
    font_family = JetBrains Mono Nerd Font Mono
    position = 1554, -233
    halign = left
    valign = top
    zindex = 12
}

# Battery Icon
label {
    monitor =
    text = cmd[update:1000] echo "$($battery --icon)"
    color = rgba(173, 48, 49, 0.8)
    font_size = 14
    position = -205, -235
    halign = right
    valign = top
    zindex = 13
}

# Battery Percentage
label {
    monitor =
    text = cmd[update:1000] echo "$($battery --percent)"
    color = rgba(17, 17, 17, 1.0)
    font_size = 32
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -158, -262
    halign = right
    valign = top
    zindex = 12
}

# Battery Status
label {
    monitor =
    text = cmd[update:1000] echo "$($battery --status)"
    color = rgba(17, 17, 17, 1.0)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono Italic
    position = -142, -310
    halign = right
    valign = top
    zindex = 12
}

# SysInfo (CPU/RAM)
label {
    monitor =
    text = cmd[update:2000] echo "$($sysinfo --cpu)   $($sysinfo --ram)"
    color = rgba(255, 255, 255, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font Mono ExtraBold
    position = -40, -320
    halign = right
    valign = top
    zindex = 5
}

# Weather Detailed (340px Width)
shape {
    monitor =
    size = 340, 190
    color = rgba(17, 17, 17, 0.7)  # Slightly more opaque
    border_size = 2                # Thicker border
    border_color = rgba(173, 48, 49, 0.8)
    shadow_passes = 2
    rounding = 25
    position = -30, -360
    halign = right
    valign = top
    zindex = 10                    # Higher zindex for the box
}

label {
    monitor =
    text = cmd[update:10000] echo "$($HOME/.config/hyprlock/scripts/weather_detailed.sh)"
    color = rgb(255, 255, 255)
    font_size = 15
    font_family = JetBrains Mono Nerd Font Mono Bold
    position = -95, -380
    halign = right
    valign = top
    zindex = 15                    # Higher zindex for text
}

# Top Processes (Glances-like)
shape {
    monitor =
    size = 340, 110
    color = rgba(17, 17, 17, 0.6)
    border_size = 1
    border_color = rgba(173, 48, 49, 0.5)
    rounding = 20
    position = -40, 40
    halign = right
    valign = bottom
    zindex = 1
}

label {
    monitor =
    text = cmd[update:3000] echo -e "$($top_procs)"
    color = rgba(255, 255, 255, 0.8)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = -190, 60
    halign = right
    valign = bottom
    zindex = 5
}
